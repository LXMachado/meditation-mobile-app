<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Submerged Sanctuary - Guided Session</title>

          extend: {

              "on-background": "#e3e3ff",
              "secondary-container": "#002d0b",
              "error": "#fd6f85",

              "surface-dim": "#0b0d1e",
              "on-primary": "#2f3078",
              "background": "#0b0d1e",

              "on-secondary": "#004b18",

              "outline": "#6f7399",

              "inverse-primary": "#5657a1",

              "outline-variant": "#414569",
              "secondary-dim": "#83c986",
              "on-secondary-container": "#6eb372",
              "surface-tint": "#b4b5ff",
              "error-dim": "#c8475d",
              "surface-container": "#141730",
              "tertiary-fixed": "#feecce",
              "inverse-on-surface": "#525468",
              "inverse-surface": "#fbf8ff",
              "on-surface": "#e3e3ff",
              "primary-fixed-dim": "#abacfc",
              "on-error": "#490013",
              "on-tertiary-fixed-variant": "#6d614a",

              "secondary-fixed-dim": "#a6eea7"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }
        .animate-breath {
            animation: subtle-pulse 8s ease-in-out infinite;
        }
        .bg-mesh {
            background: radial-gradient(circle at 50% 50%, #1f2344 0%, #0b0d1e 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body overflow-hidden selection:bg-primary/30">
<!-- Top Navigation Anchor (Task-Focused Suppression Logic applied: Small, centered, exit-focused) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-transparent">
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-high/40 backdrop-blur-md text-on-surface hover:bg-surface-container-highest transition-all duration-300">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] tracking-[0.3em] uppercase font-medium text-primary/60 mb-1">Session</span>
<span class="font-headline font-semibold text-sm tracking-tight text-on-surface">Deep Sea Drift</span>
</div>
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-high/40 backdrop-blur-md text-on-surface hover:bg-surface-container-highest transition-all duration-300">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</header>
<!-- Main Meditation Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-mesh overflow-hidden">
<!-- Background Ambient Element -->
<div class="absolute inset-0 pointer-events-none opacity-20" data-alt="abstract soft liquid patterns with deep navy and ethereal blue light shimmering like underwater bioluminescence" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCl1xW7nYEY1hHlS6N_SE_GrT6BmPx5mRF7yHhFa6wEFRhBAG9BzkkA4De_IPreoGF3v61I80UjVGGTJF38VMaAhe13wxe5zihM_rDn0dtXz9-4nBN-ByVnV8OxGEiw_jPEJ_7E7Zhb5jKy4Qbzz_-9nVxHII2ehVnwbjxaEmiQUoW8bIi7vEFwifIsHVkk-welC3uz1BUkfwpxQL9minG8ZqdYedn58MYoKkmjEbsTrxuqR1occKdpjRJXkquHJQowP907AAf7kOs'); background-size: cover; filter: blur(100px);">
</div>
<!-- Progress Indicator (Minimalistic Top) -->
<div class="absolute top-24 w-full max-w-md px-8 z-10">
<div class="flex justify-between items-center mb-3">
<span class="text-[10px] font-medium tracking-widest text-primary uppercase">Step 1 of 4</span>
<span class="text-[10px] font-medium tracking-widest text-on-surface-variant uppercase">12:45 left</span>
</div>
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-[25%] transition-all duration-1000 ease-in-out"></div>
</div>
</div>
<!-- Step Label (Asymmetric Editorial Style) -->
<div class="absolute top-48 left-8 hidden md:block">
<div class="rotate-[-90deg] origin-left translate-y-24">
<span class="text-[11px] tracking-[0.5em] font-bold text-outline-variant uppercase">Phase 01 — Arrival</span>
</div>
</div>
<!-- The Breath Orb (Signature Component) -->
<div class="relative flex items-center justify-center">
<!-- Outermost Glow -->
<div class="absolute w-[450px] h-[450px] rounded-full bg-primary/5 blur-[80px] animate-breath"></div>
<!-- Secondary Ripple -->
<div class="absolute w-80 h-80 rounded-full border border-primary/10 animate-breath" style="animation-delay: 1s;"></div>
<!-- Main Orb Container -->
<div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full flex items-center justify-center overflow-hidden animate-breath">
<!-- Inner Gradient Fill -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-secondary/10 backdrop-blur-3xl rounded-full"></div>
<!-- Center Content -->
<div class="z-10 text-center px-8">
<h2 class="text-4xl md:text-5xl font-headline font-light tracking-tighter text-on-surface mb-2">Inhale</h2>
<p class="text-xs tracking-[0.2em] font-medium text-primary/80 uppercase">Hold for 4s</p>
</div>
<!-- Glass Reflection Effect -->
<div class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent opacity-30"></div>
</div>
</div>
<!-- Instruction Text (Large, Centered, High Readability) -->
<div class="absolute bottom-40 w-full max-w-2xl px-12 text-center z-10">
<h1 class="text-2xl md:text-3xl lg:text-4xl font-headline font-medium leading-relaxed tracking-tight text-on-surface opacity-90">
                Let your breath sink like a pebble <br/> through the quiet, cool water.
            </h1>
</div>
<!-- Step-based Navigation (Pill UI) -->
<div class="absolute bottom-12 flex items-center space-x-3 px-6 py-3 bg-surface-container-high/30 backdrop-blur-2xl rounded-full border border-outline-variant/10">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-on-primary">
<span class="text-[10px] font-bold">01</span>
</div>
<div class="h-px w-4 bg-outline-variant/30"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant">
<span class="text-[10px] font-bold">02</span>
</div>
<div class="h-px w-4 bg-outline-variant/30"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant">
<span class="text-[10px] font-bold">03</span>
</div>
<div class="h-px w-4 bg-outline-variant/30"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant">
<span class="text-[10px] font-bold">04</span>
</div>
</div>
</main>
<!-- Controls (Subtle, Minimal Interference) -->
<div class="fixed bottom-12 right-8 flex flex-col gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-variant/40 backdrop-blur-lg text-on-surface border border-outline-variant/5 hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-primary/20 backdrop-blur-lg text-primary border border-primary/20 hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="pause" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
</div>
<!-- Background texture layer -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
