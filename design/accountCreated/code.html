<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#b4b5ff",
              "on-secondary-container": "#6eb372",
              "outline-variant": "#414569",
              "surface-container-lowest": "#000000",
              "error": "#fd6f85",
              "on-primary-fixed": "#1d1d66",
              "primary-dim": "#9899e8",
              "surface-variant": "#1f2344",
              "on-primary": "#2f3078",
              "on-surface": "#e3e3ff",
              "on-primary-container": "#24246d",
              "inverse-on-surface": "#525468",
              "surface-bright": "#24294f",
              "tertiary": "#fff8f2",
              "on-secondary": "#004b18",
              "surface-dim": "#0b0d1e",
              "on-surface-variant": "#a5a8d1",
              "surface-container-high": "#1a1d3a",
              "primary-fixed-dim": "#abacfc",
              "on-tertiary": "#6a5d46",
              "primary-fixed": "#bbbbff",
              "background": "#0b0d1e",
              "tertiary-dim": "#efdec0",
              "tertiary-fixed-dim": "#efdec0",
              "on-error-container": "#ff97a3",
              "inverse-surface": "#fbf8ff",
              "tertiary-fixed": "#feecce",
              "outline": "#6f7399",
              "secondary": "#90d792",
              "on-tertiary-fixed-variant": "#6d614a",
              "on-secondary-fixed": "#03501b",
              "surface-container": "#141730",
              "secondary-dim": "#83c986",
              "on-background": "#e3e3ff",
              "inverse-primary": "#5657a1",
              "on-primary-fixed-variant": "#3c3d85",
              "secondary-fixed-dim": "#a6eea7",
              "primary": "#b4b5ff",
              "error-dim": "#c8475d",
              "tertiary-container": "#fbe9cb",
              "error-container": "#8a1632",
              "secondary-container": "#002d0b",
              "primary-container": "#a5a6f7",
              "surface": "#0b0d1e",
              "surface-container-highest": "#1f2344",
              "surface-container-low": "#0f1227",
              "on-tertiary-container": "#61553f",
              "on-tertiary-fixed": "#50452f",
              "secondary-fixed": "#b4fdb4",
              "on-secondary-fixed-variant": "#2a6e35",
              "on-error": "#490013"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(31, 35, 68, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .success-ripple {
            background: radial-gradient(circle, rgba(180, 181, 255, 0.15) 0%, rgba(11, 13, 30, 0) 70%);
        }
        .submerged-glow {
            background: radial-gradient(circle at 50% -20%, rgba(180, 181, 255, 0.08) 0%, rgba(11, 13, 30, 0) 60%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Anchor (Manual Suppression Logic: This is a Success screen, Shell is minimal) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent">
<div class="flex items-center gap-2">
<span class="text-2xl font-medium tracking-widest text-[#b4b5ff] font-headline uppercase">Submerged</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 relative submerged-glow">
<!-- Abstract Background Element -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Success Visual Container -->
<div class="relative w-full max-w-lg flex flex-col items-center text-center z-10">
<!-- Central Breath Orb / Success Icon -->
<div class="relative mb-16 flex items-center justify-center">
<!-- Outer Pulse Rings (Static Representation of Depth) -->
<div class="absolute w-64 h-64 rounded-full border border-primary/10 scale-125"></div>
<div class="absolute w-64 h-64 rounded-full border border-primary/5 scale-150"></div>
<!-- The Core Orb -->
<div class="w-48 h-48 rounded-full bg-gradient-to-br from-primary/20 to-primary-container/10 glass-panel flex items-center justify-center relative shadow-[0_0_80px_rgba(180,181,255,0.15)]">
<div class="absolute inset-0 rounded-full success-ripple"></div>
<span class="material-symbols-outlined text-6xl text-primary font-light" style="font-variation-settings: 'wght' 200;">
                        done_all
                    </span>
</div>
</div>
<!-- Content Hierarchy -->
<div class="space-y-6 max-w-md">
<h1 class="text-5xl md:text-6xl font-headline font-medium tracking-tight text-on-surface leading-[1.1]">
                    You're all set.
                </h1>
<p class="text-lg md:text-xl text-on-surface-variant/80 font-normal leading-relaxed tracking-wide">
                    The waters are calm. Your personal sanctuary is ready for your first breath.
                </p>
<div class="pt-8">
<span class="inline-block text-[10px] font-medium tracking-[0.3em] uppercase text-primary/60 mb-8 block">
                        Identity Verified &amp; Connected
                    </span>
</div>
</div>
<!-- Action Area -->
<div class="w-full max-w-xs mt-4">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-medium text-lg tracking-tight hover:opacity-90 active:scale-[0.98] transition-all duration-500 ease-out shadow-[0_20px_40px_rgba(180,181,255,0.1)]">
                    Continue
                </button>
<div class="mt-8">
<button class="text-on-surface-variant hover:text-on-surface transition-colors duration-300 text-sm font-medium tracking-wide">
                        View Journey Details
                    </button>
</div>
</div>
</div>
</main>
<!-- Footer Aesthetic (Editorial spacing) -->
<footer class="p-12 flex justify-center items-center pointer-events-none">
<div class="flex gap-4 items-center">
<div class="w-1 h-1 rounded-full bg-outline-variant/30"></div>
<div class="w-1 h-1 rounded-full bg-outline-variant/60"></div>
<div class="w-1 h-1 rounded-full bg-outline-variant/30"></div>
</div>
</footer>
<!-- Decorative Corner Element -->
<div class="fixed bottom-0 right-0 p-8 opacity-20 hidden md:block">
<div class="w-40 h-40 border-r border-b border-primary/20 rounded-br-3xl"></div>
</div>
</body></html>
