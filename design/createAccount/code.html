<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0b0d1e;
        }
        .glass-panel {
            background: rgba(31, 35, 68, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .breath-gradient {
            background: radial-gradient(circle, rgba(144, 215, 146, 0.15) 0%, rgba(180, 181, 255, 0.05) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity duration-300 active:scale-95 duration-500 ease-in-out text-[#b4b5ff]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="text-2xl font-medium tracking-widest text-[#b4b5ff]">Submerged</div>
<div class="w-10"></div> <!-- Balance spacer -->
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32 relative">
<!-- Ambient background elements -->
<div class="absolute top-1/4 -left-20 w-96 h-96 breath-gradient rounded-full blur-3xl opacity-30 pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 breath-gradient rounded-full blur-3xl opacity-20 pointer-events-none"></div>
<section class="w-full max-w-lg space-y-12 relative z-10">
<!-- Hero Typography -->
<div class="space-y-4">
<h1 class="text-5xl font-medium tracking-tight text-on-surface">Begin your journey.</h1>
<p class="text-on-surface-variant body-md leading-relaxed max-w-sm">
                    Enter the sanctuary and discover a deeper state of calm through guided immersion.
                </p>
</div>
<!-- Registration Form -->
<form class="space-y-8">
<div class="grid grid-cols-1 gap-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block text-[11px] font-medium tracking-widest uppercase text-on-surface-variant px-1">Full Name</label>
<input class="w-full h-14 px-6 rounded-xl bg-surface-container-highest border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-dim transition-all duration-300" placeholder="Alex Rivers" type="text"/>
</div>
<!-- Email Address -->
<div class="space-y-2">
<label class="block text-[11px] font-medium tracking-widest uppercase text-on-surface-variant px-1">Email Address</label>
<input class="w-full h-14 px-6 rounded-xl bg-surface-container-highest border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-dim transition-all duration-300" placeholder="alex@sanctuary.com" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Password -->
<div class="space-y-2">
<label class="block text-[11px] font-medium tracking-widest uppercase text-on-surface-variant px-1">Password</label>
<input class="w-full h-14 px-6 rounded-xl bg-surface-container-highest border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-dim transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block text-[11px] font-medium tracking-widest uppercase text-on-surface-variant px-1">Confirm</label>
<input class="w-full h-14 px-6 rounded-xl bg-surface-container-highest border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-dim transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Preference Question -->
<div class="space-y-4 pt-4">
<label class="block text-sm font-medium text-on-surface tracking-tight">What brings you here today?</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-secondary text-on-secondary text-sm font-medium transition-transform hover:scale-105 active:scale-95" type="button">Sleep</button>
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container text-sm font-medium transition-transform hover:scale-105 active:scale-95" type="button">Focus</button>
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container text-sm font-medium transition-transform hover:scale-105 active:scale-95" type="button">Relax</button>
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container text-sm font-medium transition-transform hover:scale-105 active:scale-95" type="button">Anxiety Relief</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full h-16 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-semibold tracking-wide text-lg shadow-xl shadow-primary/10 hover:opacity-90 transition-all duration-500 active:scale-[0.98]">
                        Create Account
                    </button>
</div>
</form>
<!-- Bottom Link -->
<div class="flex justify-center pt-4">
<p class="text-on-surface-variant text-sm">
                    Already have an account? 
                    <a class="text-primary font-medium hover:underline underline-offset-4 ml-1" href="#">Sign In</a>
</p>
</div>
</section>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#1f2344]/60 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-8px_32px_rgba(227,227,255,0.06)]">
<!-- Join is active in the context of creating an account -->
<a class="flex flex-col items-center justify-center text-[#e3e3ff]/60 px-6 py-2 transition-colors duration-300 hover:text-[#e3e3ff]" href="#">
<span class="material-symbols-outlined mb-1">login</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-widest uppercase">Sign In</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#b4b5ff] text-[#0b0d1e] rounded-full px-8 py-2.5 transition-all duration-500 ease-out scale-100" href="#">
<span class="material-symbols-outlined mb-1" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person_add</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-widest uppercase">Join</span>
</a>
</nav>
<!-- Decorative Image Card (Editorial Feel) -->
<div class="fixed right-12 top-1/2 -translate-y-1/2 hidden xl:block w-96 h-[32rem] rounded-[2.5rem] overflow-hidden shadow-2xl rotate-3 bg-surface-container-high border-outline-variant/10 border">
<img alt="Deep ocean meditation" class="w-full h-full object-cover opacity-60" data-alt="Dreamy abstract visualization of deep blue water with soft rays of light filtering through the surface and gentle floating particles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0MPDCNUV-lbAVYwFWqZSwOeOxSE3JITE0RWeed11-osub4MxLQpQF1C5frq6rFRlgO3VaqFU3801AUJ0HfreHrc252iSV2dH4vpdMupsF3zxgw1ZnegXBduTXPZrVuihKuY5KRmqbh9p43Zo6SagYphFTK3gzbeuREhEQbtdmL6cNBzwBJBg3KleuyT_URvyaBE0ceSUE5jiSaSP6JXlb9f-6NX0ySm8mCKhVgOLgNZ5AqcElm1NZbUgHCkBallpeVCpqRGlRfes"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
<div class="absolute bottom-10 left-10 right-10">
<h3 class="text-2xl font-medium leading-tight">Find your center in the depths.</h3>
<p class="text-on-surface-variant text-sm mt-2">Join 2M+ others on their path to clarity.</p>
</div>
</div>
</body></html>
