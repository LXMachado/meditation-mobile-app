<body class="bg-mesh min-h-screen text-on-surface font-body selection:bg-primary/30">
<!-- Top AppBar (Transactional State: Simplified) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent">
<div class="text-2xl font-medium tracking-widest text-primary">Submerged</div>
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity duration-300">close</button>
</header>
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 pt-20 pb-12">
<!-- Hero Branding Section -->
<div class="w-full max-w-md text-center mb-10">
<div class="inline-flex items-center justify-center mb-6 relative">
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full"></div>
<!-- Signature Component: The Breath Orb (Static for UI) -->
<div class="relative w-20 h-20 rounded-full bg-gradient-to-tr from-secondary to-primary opacity-90 flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
</div>
<h1 class="text-4xl md:text-5xl font-medium tracking-tight text-on-surface mb-2 leading-tight">Welcome back to peace</h1>
<p class="text-on-surface-variant font-light text-sm tracking-wide">Enter your sanctuary to continue your journey.</p>
</div>
<!-- Login Form Container -->
<div class="w-full max-w-md glass-card rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
<!-- Form Decor -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<form class="space-y-6 relative z-10">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-[11px] font-medium tracking-widest uppercase text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest/40 border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary/40 transition-all duration-300" placeholder="name@sanctuary.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-[11px] font-medium tracking-widest uppercase text-on-surface-variant">Password</label>
<a class="text-[10px] font-medium tracking-widest uppercase text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest/40 border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary/40 transition-all duration-300" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-xl" type="button">visibility_off</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-semibold rounded-full shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all duration-300 tracking-wide text-sm uppercase" type="submit">
          Sign In
        </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant/15"></div>
<span class="mx-4 text-[10px] font-medium tracking-widest uppercase text-outline">or connect with</span>
<div class="flex-grow h-[1px] bg-outline-variant/15"></div>
</div>
<!-- Social Logins -->
<div class="flex justify-center gap-6 mb-8">
<button class="w-14 h-14 rounded-full bg-surface-container-high/60 flex items-center justify-center hover:bg-surface-container-highest transition-colors border border-outline-variant/10">
<img alt="Google" class="w-6 h-6" data-alt="clean geometric google g logo in its original colors on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYjiVi600kb1wB3SxY71mfB9Na0GOEWSToh88z4qIHDhGL8HhVki3ezAUBG2Z-1x0kYfkU4U_Eayn3lY8vvsXhXRri36sarbixQKL8Rqud6pvnDIVwZypvqHBHT9IZ9gD7KtCbLR8TI_MEiT38fB5Fa3rSh8Z8wzNt9hNqIPfw0jIncKVdvPRJmORdynZvUYdNSx5gikQr9oOt7r9fyIXAM1F44Ndfccl16zJKP2XTk0rSmczzagxxoeojasn7bn1GDsXwAvRm9n8"/>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-high/60 flex items-center justify-center hover:bg-surface-container-highest transition-colors border border-outline-variant/10">
<span class="material-symbols-outlined text-2xl text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
</button>
</div>
<!-- Secondary Links -->
<div class="text-center space-y-4">
<p class="text-sm text-on-surface-variant font-light">
          New to the sanctuary? 
          <a class="text-primary font-medium hover:underline underline-offset-4 ml-1" href="#">Create Account</a>
</p>
<button class="text-[11px] font-medium tracking-widest uppercase text-outline hover:text-on-surface transition-colors">
          Continue as Guest
        </button>
</div>
</div>
<!-- Bottom Decorative Image -->
<div class="mt-16 w-full max-w-2xl overflow-hidden rounded-3xl relative h-48 opacity-40 grayscale hover:grayscale-0 transition-all duration-700">
<img class="w-full h-full object-cover" data-alt="abstract ethereal view of light rays diffusing through deep blue water with floating bioluminescent particles and soft bubbles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGvkaJOHQurgEcwKwEbspf-ODMiopmTY-HUW9YbLa7_x3ndAn0NTh2fy6v0GurI-UMxklc_P1b8W7-hedJVSBUJG7tBd0DB5PPkwKKhBtnb6XOgke8l5YQdprEUlzs1aeBbjc4XgbCWy5iwrvIF3ioxyYtyrmFdUsP-PmD1ZRmYqIDXG_yjNLlpP53XZ8pcUAe7UcyMkDVLi4Vp7Bn0nY-2z7UFvAEpAByVM49soqvxUCR_cYSrGWe0T9iNjHI9h87P8u5Hrv0Cmg"/>

</div>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#1f2344]/60 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-8px_32px_rgba(227,227,255,0.06)] md:hidden">
<div class="flex flex-col items-center justify-center bg-[#b4b5ff] text-[#0b0d1e] rounded-full px-6 py-2 transition-all duration-500 ease-out">
<span class="material-symbols-outlined mb-0.5">login</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-widest uppercase">Sign In</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e3e3ff]/60 px-6 py-2 hover:text-[#e3e3ff] transition-colors duration-300">
<span class="material-symbols-outlined mb-0.5">person_add</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-widest uppercase">Join</span>
</div>
