<body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary/30">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity duration-300 Active: scale-95 duration-500 ease-in-out text-[#b4b5ff]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<h1 class="text-2xl font-medium tracking-widest text-[#b4b5ff] font-['Manrope']">Submerged</h1>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-12 relative overflow-hidden">
<!-- Background Ambient Element -->
<div class="absolute top-1/4 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -left-20 w-80 h-80 bg-secondary/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="w-full max-w-md space-y-12 relative z-10">
<!-- Header Section -->
<div class="space-y-4 text-center md:text-left">
<h2 class="text-5xl md:text-6xl font-light tracking-tight text-on-surface leading-tight">
                    Find your <br/>
<span class="font-medium text-primary">way back</span>
</h2>
<p class="text-on-surface-variant text-lg max-w-xs mx-auto md:mx-0 font-light leading-relaxed">
                    Enter your email to receive a reset link
                </p>
</div>
<!-- Form Section -->
<form class="space-y-10">
<div class="space-y-2">
<label class="block text-xs font-medium tracking-[0.2em] uppercase text-on-surface-variant/80 ml-1">
                        Email Address
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-6 py-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 transition-all duration-300 outline-none" placeholder="name@sanctuary.com" type="email"/>
</div>
</div>
<div class="space-y-6 pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-semibold py-5 rounded-full transition-all duration-500 hover:opacity-90 active:scale-[0.98] shadow-lg shadow-primary/10" type="submit">
                        Send Reset Link
                    </button>
<div class="flex justify-center">
<a class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors duration-300 flex items-center gap-2 group" href="#">
                            Return to login
                            <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</a>
</div>
</div>
</form>
<!-- Bottom Visual Anchor -->
<div class="flex justify-center pt-8">
<div class="breath-orb-gradient w-16 h-16 rounded-full blur-xl opacity-20 animate-pulse"></div>
</div>
</div>
</main>
<!-- Content Footer / Legal (Optional Context) -->
<footer class="px-8 pb-12 flex flex-col items-center gap-4">
<div class="h-[1px] w-12 bg-outline-variant/20"></div>
<p class="text-[10px] uppercase tracking-[0.3em] text-on-surface-variant/40">
            Secure Submerged Access
        </p>
</footer>
